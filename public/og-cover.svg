<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#161c25"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.8">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#1a2029" stroke-width="1" opacity="0.5">
    <line x1="0"   y1="0"   x2="0"   y2="630"/>
    <line x1="100" y1="0"   x2="100" y2="630"/>
    <line x1="200" y1="0"   x2="200" y2="630"/>
    <line x1="300" y1="0"   x2="300" y2="630"/>
    <line x1="0"   y1="100" x2="1200" y2="100"/>
    <line x1="0"   y1="200" x2="1200" y2="200"/>
    <line x1="0"   y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="18" fill="url(#brand)"/>
    <path d="M 25 28 L 40 20 L 55 28 L 55 52 L 40 60 L 25 52 Z" fill="none" stroke="#0a0e14" stroke-width="3" stroke-linejoin="round"/>
    <line x1="25" y1="28" x2="40" y2="36" stroke="#0a0e14" stroke-width="3"/>
    <line x1="55" y1="28" x2="40" y2="36" stroke="#0a0e14" stroke-width="3"/>
    <line x1="40" y1="36" x2="40" y2="60" stroke="#0a0e14" stroke-width="3"/>
  </g>

  <text x="180" y="135" font-family="Inter, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e6edf3">ProxyBox</text>
  <text x="180" y="170" font-family="ui-monospace, monospace" font-size="18" fill="#545d68">proxybox.pro</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    Open-source proxy SaaS
  </text>
  <text x="80" y="395" font-family="Inter, -apple-system, sans-serif" font-size="56" font-weight="700" fill="url(#brand)">
    self-host IPv4 / IPv6
  </text>

  <!-- Subhead -->
  <text x="80" y="455" font-family="Inter, -apple-system, sans-serif" font-size="22" fill="#8d96a3">
    Cài 1 lệnh trên VPS của bạn · BYON · Hub Proxy · mTLS · wallet billing
  </text>

  <!-- Code box -->
  <g transform="translate(80, 495)">
    <rect width="900" height="68" rx="12" fill="#11161d" stroke="#232a36" stroke-width="1"/>
    <text x="24" y="42" font-family="ui-monospace, monospace" font-size="22" fill="#3fb950">$</text>
    <text x="48" y="42" font-family="ui-monospace, monospace" font-size="22" fill="#e6edf3">curl -fsSL https://proxybox.pro/install-panel.sh | sudo bash</text>
  </g>

  <!-- Bottom-right badges -->
  <g transform="translate(960, 80)">
    <rect width="160" height="34" rx="17" fill="#0e2e1a" stroke="#3fb950" stroke-width="1"/>
    <text x="80" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#3fb950" text-anchor="middle">MIT licence</text>
  </g>
  <g transform="translate(960, 124)">
    <rect width="160" height="34" rx="17" fill="#0d1e30" stroke="#58a6ff" stroke-width="1"/>
    <text x="80" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#58a6ff" text-anchor="middle">Rust + Tokio agent</text>
  </g>

  <!-- Foot tag -->
  <text x="1120" y="600" font-family="ui-monospace, monospace" font-size="14" fill="#545d68" text-anchor="end">proxybox.pro · v1.1.0</text>
</svg>
